version: '3.8'

services:
  # PostgreSQL Database (for local development)
  # In production, use Neon PostgreSQL
  postgres:
    image: ankane/pgvector:latest
    container_name: tasknest-postgres
    environment:
      POSTGRES_DB: tasknest
      POSTGRES_USER: tasknest
      POSTGRES_PASSWORD: tasknest_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasknest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka
  kafka:
    image: apache/kafka:latest
    container_name: tasknest-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # TaskNest API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tasknest-api
    ports:
      - "8000:8000"
    environment:
      # Environment
      ENVIRONMENT: development

      # Database (use postgres service)
      DATABASE_URL: postgresql://tasknest:tasknest_dev_password@postgres:5432/tasknest
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tasknest
      POSTGRES_USER: tasknest
      POSTGRES_PASSWORD: tasknest_dev_password

      # Kafka
      KAFKA_ENABLED: 'true'
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # OpenAI (set your API key)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AGENT_MODEL: gpt-4o

      # Channels
      GMAIL_ENABLED: 'false'
      WHATSAPP_ENABLED: 'false'
      WEBFORM_ENABLED: 'true'

      # API
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # TaskNest Worker Service
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: tasknest-worker
    environment:
      # Environment
      ENVIRONMENT: development

      # Database
      DATABASE_URL: postgresql://tasknest:tasknest_dev_password@postgres:5432/tasknest
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tasknest
      POSTGRES_USER: tasknest
      POSTGRES_PASSWORD: tasknest_dev_password

      # Kafka
      KAFKA_ENABLED: 'true'
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Logging
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      replicas: 2  # Run 2 worker instances

volumes:
  postgres_data:
  kafka_data:

networks:
  default:
    name: tasknest-network

# TaskNest API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasknest-api
  namespace: tasknest
  labels:
    app: tasknest
    component: api
spec:
  replicas: 3  # Run 3 API instances
  selector:
    matchLabels:
      app: tasknest
      component: api
  template:
    metadata:
      labels:
        app: tasknest
        component: api
    spec:
      containers:
      - name: api
        image: your-registry/tasknest-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # Load from ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: ENVIRONMENT
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: POSTGRES_DB
        - name: KAFKA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: KAFKA_ENABLED
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: AGENT_MODEL
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: AGENT_MODEL
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: API_HOST
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: API_PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: tasknest-config
              key: LOG_LEVEL

        # Load from Secret
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: tasknest-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tasknest-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tasknest-secrets
              key: DATABASE_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: tasknest-secrets
              key: OPENAI_API_KEY

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

      restartPolicy: Always

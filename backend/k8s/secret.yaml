# Secret for sensitive data
# IMPORTANT: Do not commit this file with real values!
# Use kubectl create secret or sealed-secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: tasknest-secrets
  namespace: tasknest
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "your-postgres-user"
  POSTGRES_PASSWORD: "your-postgres-password"
  DATABASE_URL: "postgresql://user:password@host:5432/database"

  # OpenAI API Key
  OPENAI_API_KEY: "sk-your-openai-api-key"

  # Twilio credentials (if WhatsApp enabled)
  TWILIO_ACCOUNT_SID: "your-twilio-sid"
  TWILIO_AUTH_TOKEN: "your-twilio-token"
  TWILIO_WHATSAPP_NUMBER: "+14155238886"

  # Gmail credentials (if email enabled)
  GMAIL_CREDENTIALS_JSON: ""
  GMAIL_TOKEN_JSON: ""
